G.shuffledOpts=sfl(raw);
}

function pickOpt(idx){
if(G.choice!==null)return;
G.choice=idx;R();
}

function doReveal(){
clearInterval(TI);G.trun=false;
const t=G.teams[G.curTeam],th=THEMES[G.theme];
const vi=G.vmap[G.theme][G.curTeam];
const v=th.variants[vi];

if(G.choice!==null&&G.choice!==‘TO’){
const o=G.shuffledOpts[G.choice];
const sc=th.scores[o.type];
applyFx(t,sc);
// Hidden mechanic: theme 2 (index 1), bad choice triggers scandal
if(G.theme===1&&o.type===‘bad’)t.fakingRating=true;
const label=[‘А’,‘Б’,‘В’][G.choice];
t.themeHistory.push({type:o.type,choiceTx:label+’: ‘+o.tx.slice(0,55)+’…’,verdict:th.vrd[o.type].v});
} else {
t.themeHistory.push({type:‘timeout’,choiceTx:‘⏱ Время вышло’,verdict:‘Штраф’});
}
G.revd=true;G.scr=‘teamresult’;R();
}

function nextTeam(){
if(G.curTeam<G.nT-1){
G.curTeam++;G.choice=null;G.revd=false;G.timer=40;G.tmax=40;G.trun=false;
prepareShuffledOpts();
G.scr=‘teamplay’;R();startT();
} else {
G.scr=‘summary’;R();
}
}

function afterSummary(){
const next=G.theme+1;
if(G.theme===1||G.theme===3){
G.eventNum=G.theme===1?1:2;
G.curOutcomes=G.teams.map(t=>evtOut(t.events[G.eventNum-1],t));
G.teams.forEach((t,i)=>applyFx(t,G.curOutcomes[i]));
G.scr=‘events’;R();return;
}
if(next>=6){G.scr=‘final’;R();return;}
goNextTheme(next);
}

function afterEvents(){
const next=G.theme+1;
if(G.eventNum===2&&G.teams.some(t=>t.fakingRating)&&!G.hiddenShown){
G.hiddenShown=true;
G.teams.filter(t=>t.fakingRating).forEach(t=>applyFx(t,HIDDEN.eff));
G.scr=‘hidden’;R();return;
}
if(next>=6){G.scr=‘final’;R();return;}
goNextTheme(next);
}

function afterHidden(){
const next=G.theme+1;
if(next>=6){G.scr=‘final’;R();return;}
goNextTheme(next);
}

function goNextTheme(idx){
G.theme=idx;G.curTeam=0;G.choice=null;G.revd=false;G.timer=40;G.tmax=40;G.trun=false;
prepareShuffledOpts();
G.scr=‘teamplay’;R();startT();
}

// ── SETUP ─────────────────────────────────────────────────────────────────────
function setNC(n){
const tmp=[];for(let i=0;i<G.nT;i++){const el=document.getElementById(‘tn’+i);if(el)tmp.push(el.value);}
G.nT=n;G.sN=tmp.concat([’’,’’,’’]).slice(0,3);R();
}

function startG(){
const names=[];
for(let i=0;i<G.nT;i++){const el=document.getElementById(‘tn’+i);names.push(el&&el.value.trim()?el.value.trim():`Агентство ${i+1}`);}
// Variant map: for each theme, each team gets a different variant (shuffled 0,1,2)
G.vmap=THEMES.map(()=>sfl([0,1,2]).slice(0,G.nT));
G.teams=TC.slice(0,G.nT).map((col,i)=>{
const pool=sfl([…RE_POOL]);
return{name:names[i],color:col,profit:5,rep:5,risk:1,fakingRating:false,timedOut:false,events:[pool[0],pool[1]||pool[0]],themeHistory:[]};
});
G.theme=0;G.curTeam=0;G.choice=null;G.revd=false;
G.timer=40;G.tmax=40;G.trun=false;
G.eventNum=0;G.curOutcomes=[];G.hiddenShown=false;
prepareShuffledOpts();
G.scr=‘intro’;R();
}

function resetG(){
clearInterval(TI);
G={scr:‘title’,nT:3,sN:[’’,’’,’’],teams:[],theme:0,curTeam:0,shuffledOpts:null,choice:null,revd:false,timer:40,tmax:40,trun:false,vmap:[],eventNum:0,curOutcomes:[],hiddenShown:false};
R();
}

R();
</script>
